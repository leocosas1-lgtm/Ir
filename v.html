<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrar visita</title>
  <style>
    :root {
      --bg: #f8fafc; --surface: #fff; --border: #e2e8f0;
      --text: #0f172a; --text2: #475569; --text3: #94a3b8;
      --accent: #2563eb; --success: #059669; --danger: #dc2626; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body { padding: 20px 18px 40px; max-width: 480px; margin: 0 auto; }

    .header { margin-bottom: 20px; padding-top: 8px; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .header-info { min-width: 0; }
    .local-nombre { font-size: 20px; font-weight: 700; line-height: 1.25; overflow-wrap: break-word; }
    .local-terr { font-size: 13px; color: var(--text3); margin-top: 2px; }

    .horario-badge { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 1px;
      padding: 7px 13px; border-radius: 12px; border: 1px solid var(--border); background: #eff6ff;
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .1s; }
    .horario-badge:active { transform: scale(0.96); }
    .horario-badge-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
    .horario-badge-val { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .horario-badge.disponible { background: #ecfdf5; border-color: #a7f3d0; }
    .horario-badge.disponible .horario-badge-val { color: var(--success); }
    .horario-badge.sin-datos { background: #fffbeb; border-color: #fde68a; }
    .horario-badge.sin-datos .horario-badge-val { color: #b45309; }

    .horario-expandido { margin-top: 10px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); display: none; }
    .horario-expandido.abierto { display: block; }
    .horario-lista { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; color: var(--text2); }
    .horario-lista .hoy { font-weight: 700; color: var(--text); }
    .horario-dia { text-transform: capitalize; display: inline-block; width: 84px; }
    .horario-aviso { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
    .card-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }

    .radio-list { display: flex; flex-direction: column; gap: 10px; }
    .radio-opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color .12s, background .12s; }
    .radio-opt:hover { border-color: #cbd5e1; background: #f8fafc; }
    .radio-opt.sel { border-color: var(--accent); background: #eff6ff; }
    .radio-opt input[type=radio] { display: none; }
    .radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .radio-opt.sel .radio-dot { border-color: var(--accent); background: var(--accent); }
    .radio-dot::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; }
    .radio-opt.sel .radio-dot::after { opacity: 1; }
    .radio-txt { font-size: 15px; font-weight: 500; }

    textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 14px; color: var(--text); resize: vertical; min-height: 80px;
    }
    textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

    .chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip-chk { display: none; }
    .chip-lbl { padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; user-select: none; transition: transform .1s; }
    .chip-lbl:active { transform: scale(0.96); }
    .chip-chk:checked + .chip-lbl { background: var(--accent); color: #fff; border-color: var(--accent); }

    .cat-bloque { border-top: 1px solid var(--border); padding-top: 14px; margin-top: -1px; }
    .cat-bloque .card-lbl { color: var(--accent); }

    .btn-registrar {
      width: 100%; padding: 16px; border: none; border-radius: var(--radius);
      background: var(--success); color: #fff; font-family: inherit; font-size: 16px;
      font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .15s, transform .1s;
    }
    .btn-registrar:hover:not(:disabled) { background: #047857; }
    .btn-registrar:active:not(:disabled) { transform: scale(0.98); }
    .btn-registrar:disabled { opacity: 0.55; cursor: not-allowed; }

    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #cargando { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
    #exito { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 32px 20px; }
    .exito-icono { font-size: 72px; margin-bottom: 20px; }
    .exito-titulo { font-size: 24px; font-weight: 700; color: var(--success); margin-bottom: 8px; }
    .exito-sub { font-size: 15px; color: var(--text2); }

    .err-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); padding: 16px 18px; color: #dc2626; font-size: 14px; margin-top: 24px; }
  </style>
</head>
<body>

<div id="cargando">Cargando…</div>

<div id="form" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-info">
        <div class="local-nombre" id="lblNombre"></div>
        <div class="local-terr" id="lblTerr"></div>
      </div>
      <div class="horario-badge" id="horarioBadge" onclick="toggleHorario()" style="display:none">
        <span class="horario-badge-lbl" id="horarioBadgeLbl">Hoy</span>
        <span class="horario-badge-val" id="horarioHoy">—</span>
      </div>
    </div>
    <div class="horario-expandido" id="horarioExpandido">
      <div class="horario-lista" id="horarioLista"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-lbl">Estado de la visita</div>
    <div class="radio-list" id="radioList">
      <label class="radio-opt sel" data-val="Visitado">
        <input type="radio" name="estado" value="Visitado" checked>
        <div class="radio-dot"></div>
        <span class="radio-txt">✓ Visitado</span>
      </label>
      <label class="radio-opt" data-val="No estaba">
        <input type="radio" name="estado" value="No estaba">
        <div class="radio-dot"></div>
        <span class="radio-txt">No estaba</span>
      </label>
      <label class="radio-opt" data-val="Llamar después">
        <input type="radio" name="estado" value="Llamar después">
        <div class="radio-dot"></div>
        <span class="radio-txt">Llamar después</span>
      </label>
      <label class="radio-opt" data-val="Cliente nuevo">
        <input type="radio" name="estado" value="Cliente nuevo">
        <div class="radio-dot"></div>
        <span class="radio-txt">Cliente nuevo</span>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="card-lbl">Marca (puede elegir varias)</div>
    <div class="chips-wrap" id="chipsMarca">
      <input type="checkbox" class="chip-chk marca-chk" id="m-Vivo" data-marca="Vivo" onchange="toggleCategoria(this)">
      <label class="chip-lbl" for="m-Vivo">Vivo</label>
      <input type="checkbox" class="chip-chk marca-chk" id="m-Arizona" data-marca="Arizona" onchange="toggleCategoria(this)">
      <label class="chip-lbl" for="m-Arizona">Arizona</label>
      <input type="checkbox" class="chip-chk marca-chk" id="m-Ambrosoli" data-marca="Ambrosoli" onchange="toggleCategoria(this)">
      <label class="chip-lbl" for="m-Ambrosoli">Ambrosoli</label>
    </div>

    <div class="cat-bloque" id="cat-Vivo" data-marca="Vivo" style="display:none">
      <div class="card-lbl" style="margin-top:16px">Categoría — Vivo</div>
      <div class="chips-wrap">
        <input type="checkbox" class="chip-chk" id="c-Vivo-0" value="Nectar de 1 litro"><label class="chip-lbl" for="c-Vivo-0">Nectar de 1 litro</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-1" value="Tripack 140ml"><label class="chip-lbl" for="c-Vivo-1">Tripack 140ml</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-2" value="Jugo en polvo"><label class="chip-lbl" for="c-Vivo-2">Jugo en polvo</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-3" value="Mifrut 90"><label class="chip-lbl" for="c-Vivo-3">Mifrut 90</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-4" value="Mifrut 120gr"><label class="chip-lbl" for="c-Vivo-4">Mifrut 120gr</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-5" value="Cereales"><label class="chip-lbl" for="c-Vivo-5">Cereales</label>
        <input type="checkbox" class="chip-chk" id="c-Vivo-6" value="Granolas"><label class="chip-lbl" for="c-Vivo-6">Granolas</label>
      </div>
    </div>

    <div class="cat-bloque" id="cat-Arizona" data-marca="Arizona" style="display:none">
      <div class="card-lbl" style="margin-top:16px">Categoría — Arizona</div>
      <div class="chips-wrap">
        <input type="checkbox" class="chip-chk" id="c-Arizona-0" value="340ml"><label class="chip-lbl" for="c-Arizona-0">340ml</label>
        <input type="checkbox" class="chip-chk" id="c-Arizona-1" value="650ml"><label class="chip-lbl" for="c-Arizona-1">650ml</label>
        <input type="checkbox" class="chip-chk" id="c-Arizona-2" value="Tetra box"><label class="chip-lbl" for="c-Arizona-2">Tetra box</label>
      </div>
    </div>

    <div class="cat-bloque" id="cat-Ambrosoli" data-marca="Ambrosoli" style="display:none">
      <div class="card-lbl" style="margin-top:16px">Categoría — Ambrosoli</div>
      <div class="chips-wrap">
        <input type="checkbox" class="chip-chk" id="c-Ambrosoli-0" value="Mentitas"><label class="chip-lbl" for="c-Ambrosoli-0">Mentitas</label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-lbl">Nota adicional (opcional)</div>
    <textarea id="nota" placeholder="Ej: Interesado en el catálogo, llamar el lunes…"></textarea>
  </div>

  <button class="btn-registrar" id="btnReg" onclick="registrar()">Registrar visita</button>
</div>

<!-- Pantalla de éxito -->
<div id="exito">
  <div class="exito-icono">✅</div>
  <div class="exito-titulo">¡Visita registrada!</div>
  <div class="exito-sub" id="exitoSub"></div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtVNCCmQPQov4-gszTqqWO5TJixk-rYrU3KT-JPZ73lmX0FVg7ycBPx2apm5qVjKYI/exec';
var DIAS_SEMANA = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];

var params = new URLSearchParams(window.location.search);
var CODIGO = params.get('c') || '';
var PID = '', NOMBRE = '', TERRITORIO = '';

function mostrarError(msg) {
  document.getElementById('cargando').style.display = 'none';
  document.getElementById('form').innerHTML = '<div class="err-box">⚠️ ' + msg + '</div>';
  document.getElementById('form').style.display = 'block';
}

function pintarHorario(horario) {
  var badge = document.getElementById('horarioBadge');
  var lista = document.getElementById('horarioLista');
  var lbl = document.getElementById('horarioBadgeLbl');
  lista.innerHTML = '';

  if (!horario) {
    badge.className = 'horario-badge sin-datos';
    lbl.textContent = 'Horario';
    document.getElementById('horarioHoy').textContent = 'No disp.';
    var aviso = document.createElement('div');
    aviso.className = 'horario-aviso';
    aviso.textContent = 'No tenemos el horario de este negocio registrado. Antes de asumir que está abierto, confírmalo con el equipo de ventas.';
    lista.appendChild(aviso);
    badge.style.display = 'flex';
    return;
  }

  var hoy = DIAS_SEMANA[new Date().getDay()];
  var horaHoy = '';

  horario.split('|').forEach(function(seg) {
    var partes = seg.split(':');
    var dia = (partes.shift() || '').trim().toLowerCase();
    var horas = (partes.join(':').trim()) || 'Cerrado';
    if (!dia) return;
    var fila = document.createElement('div');
    if (dia === hoy) { fila.className = 'hoy'; horaHoy = horas; }
    fila.innerHTML = '<span class="horario-dia">' + dia + '</span>' + horas;
    lista.appendChild(fila);
  });

  lbl.textContent = 'Hoy';
  document.getElementById('horarioHoy').textContent = horaHoy || '—';
  badge.className = 'horario-badge disponible';
  badge.style.display = 'flex';
}

function toggleHorario() {
  document.getElementById('horarioExpandido').classList.toggle('abierto');
}

function toggleCategoria(chk) {
  var bloque = document.getElementById('cat-' + chk.getAttribute('data-marca'));
  if (!bloque) return;
  if (chk.checked) {
    bloque.style.display = 'block';
  } else {
    bloque.style.display = 'none';
    bloque.querySelectorAll('.chip-chk').forEach(function(c) { c.checked = false; });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  if (!CODIGO) { mostrarError('Enlace inválido — falta el código.<br>Usa el link que te envió el administrador.'); return; }

  fetch(SCRIPT_URL + '?action=guardarVisita&codigo=' + encodeURIComponent(CODIGO))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) throw new Error(data.error || 'Código no encontrado');
      PID = data.pid;
      NOMBRE = data.nombre;
      TERRITORIO = data.territorio;

      document.getElementById('lblNombre').textContent = NOMBRE || 'Local sin nombre';
      document.getElementById('lblTerr').textContent = TERRITORIO || '';
      pintarHorario(data.horario);

      document.getElementById('cargando').style.display = 'none';
      document.getElementById('form').style.display = 'block';
    })
    .catch(function(e) {
      mostrarError('No se pudo cargar este link (' + e.message + ').<br>Pídele al administrador que te envíe uno nuevo.');
    });

  document.querySelectorAll('.radio-opt').forEach(function(opt) {
    opt.addEventListener('click', function() {
      document.querySelectorAll('.radio-opt').forEach(function(o) { o.classList.remove('sel'); });
      opt.classList.add('sel');
      opt.querySelector('input').checked = true;
    });
  });
});

function recolectarInteracciones() {
  var out = [];
  document.querySelectorAll('.cat-bloque').forEach(function(bloque) {
    if (bloque.style.display === 'none') return;
    var marca = bloque.getAttribute('data-marca');
    bloque.querySelectorAll('.chip-chk:checked').forEach(function(c) {
      out.push({ marca: marca, categoria: c.value });
    });
  });
  return out;
}

function registrar() {
  var radioChecked = document.querySelector('input[name=estado]:checked');
  var estado = radioChecked ? radioChecked.value : 'Visitado';
  var nota = document.getElementById('nota').value.trim();
  var estadoFinal = nota ? (estado + ' — ' + nota) : estado;
  var interacciones = recolectarInteracciones();

  var btn = document.getElementById('btnReg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Guardando…';

  var url = SCRIPT_URL + '?action=guardarVisita'
    + '&pid=' + encodeURIComponent(PID)
    + '&nombre=' + encodeURIComponent(NOMBRE)
    + '&territorio=' + encodeURIComponent(TERRITORIO)
    + '&estado=' + encodeURIComponent(estadoFinal)
    + '&interacciones=' + encodeURIComponent(JSON.stringify(interacciones));

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) throw new Error(data.error || 'Error desconocido');
      document.getElementById('form').style.display = 'none';
      var ex = document.getElementById('exito');
      ex.style.display = 'flex';
      document.getElementById('exitoSub').textContent = (NOMBRE || 'Local') + ' · ' + estadoFinal;
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = 'Registrar visita';
      alert('Error al guardar: ' + e.message);
    });
}
</script>
</body>
</html>
